name: blog_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  expandable: ^5.0.1
  flutter_secure_storage: ^10.0.0
  fluttertoast: ^9.0.0
  intl: ^0.20.2
  provider: ^6.1.5+1
  go_router: ^17.1.0
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # 1. Add the generator package to dev_dependencies (Don't miss this step!)
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/logo.png" # Path to your high-res logo file
  min_sdk_android: 21 # ensures adaptive icon support compatibility

flutter:
  uses-material-design: true

  # 2. Register your exact asset folder path here
  assets:
    - assets/images/
    - assets/icons/

# 3. CRITICAL: Put this completely outside the "flutter:" section (zero indentation)
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icons/splash_logo.png
  
  fullscreen: true
  android_gravity: center
  ios_content_mode: center

  android_12:
    image: assets/icons/splash_logo.png
    color: "#FFFFFF"